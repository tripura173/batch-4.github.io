<!DOCTYPE html>
<html>
<head>
<title>Select Subject</title>

<style>

body{
font-family: Arial;
background:#0b1833;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:#f1f5f9;
padding:40px;
border-radius:12px;
text-align:center;
width:600px;
}

.subjects button{
padding:12px 25px;
margin:10px;
background:#0b1833;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.subjects button:hover{
background:#1e293b;
}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.popup-content{
background:white;
padding:25px;
border-radius:10px;
width:350px;
text-align:left;
}

.popup-content button{
margin-top:10px;
padding:8px 15px;
background:#0b1833;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>Select Subject</h2>

<div class="subjects">

<button onclick="showInstructions('C')">C</button>

<button onclick="showInstructions('Python')">Python</button>

<button onclick="showInstructions('Java')">Java</button>

<button onclick="showInstructions('DBMS')">DBMS</button>

<button onclick="showInstructions('Front End')">Front End</button>

</div>

</div>

<div id="instructionBox" class="popup">

<div class="popup-content">

<h3 id="subjectTitle"></h3>

<p><b>Exam Instructions</b></p>

<ul>
<li>Total Questions : 20</li>
<li>Each question has 4 options</li>
<li>Only one correct answer</li>
<li>Time Limit : 20 Minutes</li>
<li>Do not refresh the page</li>
</ul>

<button onclick="startExam()">Start Exam</button>

<button onclick="closePopup()">Cancel</button>

</div>

</div>

<script>

let selectedSubject="";

function showInstructions(subject){

selectedSubject = subject;

document.getElementById("subjectTitle").innerText = subject + " Exam";

document.getElementById("instructionBox").style.display="flex";

}

function closePopup(){

document.getElementById("instructionBox").style.display="none";

}

function startExam(){

localStorage.setItem("subject",selectedSubject);

window.location.href="quiz.html";

}

</script>

</body>
</html>
